<!DOCTYPE html>
<html>
<head>
    <title>Chennai Bus Route Optimizer</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 6px 18px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 15px;
        }

        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #0077b6;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #005f8e;
        }

        .time {
            color: red;
            font-weight: bold;
        }

        #map {
            height: 400px;
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🚌 Chennai Bus Route Optimizer</h2>

    <form method="POST">
        <select name="source" required>
            <option value="">Select Source</option>
            <option>Tambaram</option>
            <option>Guindy</option>
            <option>Velachery</option>
            <option>T Nagar</option>
            <option>Adyar</option>
            <option>Anna Nagar</option>
        </select>

        <select name="destination" required>
            <option value="">Select Destination</option>
            <option>Tambaram</option>
            <option>Guindy</option>
            <option>Velachery</option>
            <option>T Nagar</option>
            <option>Adyar</option>
            <option>Anna Nagar</option>
        </select>

        <select name="traffic">
            <option value="normal">Normal Traffic</option>
            <option value="moderate">Moderate Traffic</option>
            <option value="heavy">Heavy Traffic</option>
        </select>

        <button type="submit">Find Best Route</button>
    </form>

    {% if result %}
        <h3>Best Route:</h3>
        <p>{{ result.path }}</p>
        <p>Total Time: <span class="time">{{ result.time }} minutes</span></p>
    {% endif %}

    <!-- MAP ALWAYS VISIBLE -->
    <div id="map"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var coordinates = {{ coordinates | tojson }};

var map = L.map('map').setView([13.04, 80.23], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

{% if result %}
    var route = "{{ result.path }}".split(" → ");

    var start = coordinates[route[0]];
    var end = coordinates[route[route.length - 1]];

    // ADD YOUR API KEY HERE
    var apiKey = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjNkYzFlNGU3NTM1YzRmNTViMTUxOGFhNjdkODRjODBmIiwiaCI6Im11cm11cjY0In0=";

    fetch(`https://api.openrouteservice.org/v2/directions/driving-car?api_key=${apiKey}&start=${start[1]},${start[0]}&end=${end[1]},${end[0]}`)
    .then(response => response.json())
    .then(data => {

        var coords = data.features[0].geometry.coordinates;

        var latlngs = coords.map(function(coord) {
            return [coord[1], coord[0]];
        });

        L.polyline(latlngs, {
            color: 'blue',
            weight: 5
        }).addTo(map);

        L.marker(start).addTo(map).bindPopup(route[0]);
        L.marker(end).addTo(map).bindPopup(route[route.length - 1]);

        map.fitBounds(latlngs);
    });
{% endif %}
</script>

</body>
</html>
