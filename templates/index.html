<!DOCTYPE html>
<html>
<head>
    <title>Chennai Bus Route Optimizer</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.1);
        }

        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
        }

        button {
            background: #0077b6;
            color: white;
            border: none;
            cursor: pointer;
        }

        #map {
            height: 400px;
            margin-top: 20px;
            border-radius: 10px;
        }

        .time {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🚌 Chennai Bus Route Optimizer</h2>

    <form method="POST">
        <select name="source" required>
            <option value="">Select Source</option>
            <option>Tambaram</option>
            <option>Guindy</option>
            <option>Velachery</option>
            <option>T Nagar</option>
            <option>Adyar</option>
            <option>Anna Nagar</option>
        </select>

        <select name="destination" required>
            <option value="">Select Destination</option>
            <option>Tambaram</option>
            <option>Guindy</option>
            <option>Velachery</option>
            <option>T Nagar</option>
            <option>Adyar</option>
            <option>Anna Nagar</option>
        </select>

        <select name="traffic">
            <option value="normal">Normal Traffic</option>
            <option value="moderate">Moderate Traffic</option>
            <option value="heavy">Heavy Traffic</option>
        </select>

        <button type="submit">Find Best Route</button>
    </form>

    {% if result %}
        <h3>Best Route:</h3>
        <p>{{ result.path }}</p>
        <p>Total Time: <span class="time">{{ result.time }} minutes</span></p>

        <div id="map"></div>
    {% endif %}
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

{% if result %}
<script>
    var apiKey = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjNkYzFlNGU3NTM1YzRmNTViMTUxOGFhNjdkODRjODBmIiwiaCI6Im11cm11cjY0In0=";

var start = coordinates[route[0]];
var end = coordinates[route[route.length - 1]];

fetch(`https://api.openrouteservice.org/v2/directions/driving-car?api_key=${apiKey}&start=${start[1]},${start[0]}&end=${end[1]},${end[0]}`)
.then(response => response.json())
.then(data => {

    var coords = data.features[0].geometry.coordinates;

    var latlngs = coords.map(function(coord) {
        return [coord[1], coord[0]];
    });

    L.polyline(latlngs, {color: 'blue', weight: 5}).addTo(map);

});
</script>
{% endif %}

</body>
</html>
