<!DOCTYPE html>
<html>
<head>
    <title>Chennai Bus Route Optimizer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #2193b0, #6dd5ed);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            margin-top: 12px;
            display: block;
        }

        select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 10px;
            background: #2193b0;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #176d85;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f9ff;
            border-radius: 10px;
        }

        .result h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .time {
            font-weight: bold;
            color: #d62828;
            font-size: 18px;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            margin-top: 15px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🚌 Chennai Bus Route Optimizer</h2>

    <form method="POST">

        <label>Source</label>
        <select name="source" required>
            <option value="">Select Location</option>
            <option>Tambaram</option>
            <option>Guindy</option>
            <option>Velachery</option>
            <option>T Nagar</option>
            <option>Adyar</option>
            <option>Anna Nagar</option>
        </select>

        <label>Destination</label>
        <select name="destination" required>
            <option value="">Select Location</option>
            <option>Tambaram</option>
            <option>Guindy</option>
            <option>Velachery</option>
            <option>T Nagar</option>
            <option>Adyar</option>
            <option>Anna Nagar</option>
        </select>

        <label>Traffic Level</label>
        <select name="traffic">
            <option value="normal">Normal Traffic</option>
            <option value="moderate">Moderate Traffic</option>
            <option value="heavy">Heavy Traffic</option>
        </select>

        <button type="submit">Find Best Route</button>
    </form>

    {% if result %}
    <div class="result">
        <h3>🚏 Best Route</h3>
        <p>{{ result.path }}</p>
        <p>Total Travel Time: 
            <span class="time">{{ result.time }} minutes</span>
        </p>
    </div>
    {% endif %}

    <div class="footer">
        Real-time traffic adjusted prototype
    </div>
</div>

</body>
</html>
